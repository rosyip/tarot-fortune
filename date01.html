<script src="https://cdn.tailwindcss.com"></script>
<style>
  .perspective { perspective: 1000px; }
  .flip-inner { transition: transform 0.7s; transform-style: preserve-3d; }
  .flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back { backface-visibility: hidden; }
  .flip-back { transform: rotateY(180deg); }
</style>
</head>

<body class="bg-[url('https://raw.githubusercontent.com/rosyip/tarot-fortune/main/Tarot/background.png')] bg-cover bg-center min-h-screen text-white flex items-center justify-center p-5">

<div class="w-full max-w-sm mx-auto bg-white/10 backdrop-blur-xl rounded-3xl shadow-xl p-6">

  <!-- 塔罗牌 -->
  <div class="perspective w-36 h-64 mx-auto mb-5 cursor-pointer" id="cardBox">
    <div class="flip-inner w-full h-full relative">
      <!-- 牌背 -->
      <div class="flip-front absolute w-full h-full rounded-xl overflow-hidden shadow-lg">
        <img src="https://raw.githubusercontent.com/rosyip/tarot-fortune/main/Tarot/back.png" class="w-full h-full object-cover">
      </div>
      <!-- 牌面 -->
      <div class="flip-back absolute w-full h-full rounded-xl overflow-hidden shadow-lg">
        <img id="tarotImg" class="w-full h-full object-cover">
      </div>
    </div>
  </div>

  <!-- 牌信息（全部在牌外，绝不重叠） -->
  <div class="text-center mb-1">
    <div id="tarotName" class="text-lg font-bold"></div>
    <div id="tarotPos" class="text-sm text-purple-200"></div>
  </div>

  <div class="text-center text-sm text-purple-100 mt-2 mb-4 h-[40px] flex items-center justify-center" id="meaning"></div>

  <!-- 答案之书 -->
  <div class="bg-white/10 rounded-xl p-4 text-center italic text-purple-100 min-h-[60px] flex items-center justify-center mb-5" id="oracle">
    点击塔罗牌抽取今日指引
  </div>


</div>

// 抽卡
function draw() {
  const c = cards[Math.floor(Math.random()*cards.length)]
  const rev = Math.random() > 0.5
  document.getElementById('tarotName').innerText = c.n
  document.getElementById('tarotPos').innerText = rev ? "逆位" : "正位"
  document.getElementById('meaning').innerText = rev ? c.r : c.m
  document.getElementById('tarotImg').src = "https://raw.githubusercontent.com/rosyip/tarot-fortune/main/Tarot/" + c.f
  document.getElementById('tarotImg').style.transform = rev ? "rotate(180deg)" : "rotate(0deg)"
  document.getElementById('oracle').innerText = books[Math.floor(Math.random()*books.length)]
  document.getElementById('cardBox').classList.add('flipped')
}

// 点击翻牌或重新抽卡
document.getElementById('cardBox').onclick = () => {
  // 如果已经翻开，先翻回牌背
  if (document.getElementById('cardBox').classList.contains('flipped')) {
    document.getElementById('cardBox').classList.remove('flipped')
    setTimeout(draw, 700)
  } else {
    // 如果未翻开，直接抽卡
    draw()
  }
}
